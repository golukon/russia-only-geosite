name: build.yml
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set variables
        run: |
          echo "RELEASE_NAME=$(date +%d-%m-%Y)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%d-%m-%Y)" >> $GITHUB_ENV

      - name: Sync forks with upstream
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          sync_fork() {
            repo="$1"
            branch="$2"
            echo "Syncing ${repo} (branch: ${branch})..."
            if ! gh api "repos/${repo}/merge-upstream" -f "branch=${branch}" --jq '.message'; then
              echo "::warning::Failed to sync ${repo}. Build will continue with the current fork state."
            fi
          }

          sync_fork golukon/domain-list-community master
          sync_fork golukon/domains-only-russia main
          sync_fork golukon/russia-mobile-internet-whitelist main

      - name: Checkout golukon/domain-list-community
        uses: actions/checkout@v4
        with:
          repository: golukon/domain-list-community
          path: community

      - name: Checkout golukon/domains-only-russia
        uses: actions/checkout@v4
        with:
          repository: golukon/domains-only-russia
          path: domains-only-russia

      - name: Checkout golukon/russia-mobile-internet-whitelist
        uses: actions/checkout@v4
        with:
          repository: golukon/russia-mobile-internet-whitelist
          path: russia-mobile-internet-whitelist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./community/go.mod
          cache-dependency-path: ./community/go.sum

      - name: Build geosite.dat file
        run: |
          mkdir -p ./data ./publish
          grep -v '^include:category-gov-ru' ./domains-only-russia/ru-available-only-inside > ./data/ru-inside
          cat ./community/data/category-gov-ru >> ./data/ru-inside
          cat ./russia-mobile-internet-whitelist/whitelist.txt >> ./data/ru-inside
          printf '%s\n' '[{"name":"geosite.dat","mode":"allowlist","lists":["ru-inside"]}]' > ./datprofile.json

          cd community
          go run ./ \
            --datapath=../data \
            --datprofile=../datprofile.json \
            --outputdir=../publish

          cd ../publish
          sha256sum geosite.dat > geosite.dat.sha256sum

      - name: Release and upload assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          file: ./publish/*
          overwrite: true

      - name: Git push assets to "release" branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release
